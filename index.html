<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secret Message</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: black;
      color: red;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100vh;
    }

    #start-btn, #next-btn, #dont-click-btn {
      padding: 15px 25px;
      margin-top: 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #dont-click-btn {
      background-color: red;
      color: white;
    }

    #romantic-section, #message-section {
      display: none;
    }

    .hearts {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: pink;
      transform: rotate(45deg);
      animation: float 5s infinite;
    }

    .heart::before, .heart::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: pink;
      border-radius: 50%;
    }

    .heart::before {
      top: -10px;
      left: 0;
    }

    .heart::after {
      left: -10px;
      top: 0;
    }

    @keyframes float {
      0% {
        top: 100%;
        opacity: 1;
      }
      100% {
        top: -10%;
        opacity: 0;
      }
    }

    img {
      max-width: 90%;
      height: auto;
      border-radius: 10px;
      margin-top: 20px;
    }

    .romantic {
      background-color: pink;
      color: darkred;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="warning-section">
    <h1>⚠️ WARNING ⚠️</h1>
    <p style="font-size: 20px;">DON’T PRESS THE BUTTON IF YOU DON’T WANT TO KNOW WHAT LEO HAS BEEN THINKING OF YOU</p>
    <button id="dont-click-btn">DON'T CLICK</button>
  </div>

  <div id="romantic-section" class="romantic">
    <div class="hearts" id="hearts-container"></div>
    <h2>100 REASONS I LIKE YOU</h2>
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgA..." alt="Your Cute Photo" />
    <br>
    <button id="start-btn">START</button>
  </div>

  <div id="message-section" class="romantic">
    <h2 id="message-text"></h2>
    <button id="next-btn">NEXT</button>
  </div>

  <script>
    const dontClickBtn = document.getElementById("dont-click-btn");
    const warningSection = document.getElementById("warning-section");
    const romanticSection = document.getElementById("romantic-section");
    const messageSection = document.getElementById("message-section");
    const startBtn = document.getElementById("start-btn");
    const nextBtn = document.getElementById("next-btn");
    const messageText = document.getElementById("message-text");

    const messages = [
      "You are the prettiest dude I have dated in the past 2 years",
      "You are the chillest girl in Binong Area"
    ];
    let index = 0;

    dontClickBtn.onclick = () => {
      warningSection.style.display = "none";
      romanticSection.style.display = "flex";
      generateHearts();
    };

    startBtn.onclick = () => {
      romanticSection.style.display = "none";
      messageSection.style.display = "flex";
      messageText.innerText = messages[index];
    };

    nextBtn.onclick = () => {
      index++;
      if (index < messages.length) {
        messageText.innerText = messages[index];
      } else {
        nextBtn.style.display = "none";
        messageText.innerText = "That's just the beginning... ❤️";
      }
    };

    function generateHearts() {
      const container = document.getElementById("hearts-container");
      for (let i = 0; i < 30; i++) {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = 2 + Math.random() * 3 + "s";
        container.appendChild(heart);
      }
    }
  </script>
</body>
</html>
