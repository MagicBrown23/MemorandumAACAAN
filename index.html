<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leo's Secret</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
      color: red;
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
    h1 {
      font-size: 2rem;
      margin: 20px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }
    button {
      background: red;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 1.2rem;
      cursor: pointer;
      margin-top: 30px;
      border-radius: 8px;
    }
    .hidden {
      display: none;
    }
    img {
      max-width: 300px;
      margin: 10px;
    }
  </style>
</head>
<body>

  <audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mp3">
  </audio>

  <!-- PAGE 1 -->
  <div id="page1">
    <h1>WARNING, DON'T PRESS THE BUTTON IF YOU DON'T WANT TO KNOW WHAT HAS LEO BEEN THINKING OF YOU</h1>
    <button onclick="showPage2()">DON'T CLICK</button>
  </div>

  <!-- PAGE 2 -->
  <div id="page2" class="hidden">
    <!-- INSERT YOUR PHOTOS BELOW -->
    <img src="https://via.placeholder.com/300x200.png?text=Photo+1" alt="photo1">
    <img src="https://via.placeholder.com/300x200.png?text=Photo+2" alt="photo2">
    <h2 style="color:white;">100 REASONS I LIKE YOU</h2>
    <button onclick="showMessage(0)">START</button>
  </div>

  <!-- MESSAGE PAGES -->
  <div id="messagePage" class="hidden">
    <h2 id="messageText"></h2>
    <button onclick="nextMessage()">NEXT</button>
  </div>

  <script>
    function showPage2() {
      document.getElementById('page1').classList.add('hidden');
      document.getElementById('page2').classList.remove('hidden');
    }

    const messages = [
      "You are the prettiest dude I have dated in this past 2 years",
      "You are the chillest girl in Binong area"
    ];
    let messageIndex = 0;

    function showMessage(index) {
      document.getElementById('page2').classList.add('hidden');
      document.getElementById('messagePage').classList.remove('hidden');
      document.getElementById('messageText').innerText = messages[index];
    }

    function nextMessage() {
      messageIndex++;
      if (messageIndex < messages.length) {
        document.getElementById('messageText').innerText = messages[messageIndex];
      } else {
        document.getElementById('messagePage').innerHTML = "<h2>I have more to tell you... but only in person 💌</h2>";
      }
    }
  </script>

</body>
</html>
